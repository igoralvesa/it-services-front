<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Troca de senha de clientes — Placeholder Tech</title>
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/layout.css" />
    <link rel="stylesheet" href="assets/css/components.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <div class="site-branding">
          <!-- TODO: replace logo -->
          <img
            class="site-logo"
            src="https://placehold.co/112x112/e8eaf0/176c5c?text=LOGO"
            alt="Área reservada para o logotipo da empresa"
            width="48"
            height="48"
          />
          <div>
            <span class="brand-name">Placeholder Tech LTDA</span>
            <p class="site-tagline">Troca de senha de clientes</p>
          </div>
        </div>
        <nav class="site-nav" aria-label="Navegação principal">
          <a href="index.html">Início</a>
          <a href="login.html">Login</a>
          <a href="register.html">Cadastro</a>
          <a href="services.html" id="nav-services" class="is-hidden" aria-hidden="true"
            >Solicitação de serviços</a
          >
        </nav>
      </div>
    </header>

    <main class="site-main">
      <h1 class="page-title">Troca de senha de clientes</h1>

      <div class="card auth-card">
        <form id="change-password-form" novalidate>
          <div class="form-group">
            <label for="cp-login">Login (e-mail)</label>
            <input type="email" id="cp-login" name="email" autocomplete="username" required />
            <p id="cp-login-feedback" class="form-feedback" role="alert"></p>
          </div>
          <div class="form-group">
            <label for="cp-password">Nova senha</label>
            <input type="password" id="cp-password" name="password" autocomplete="new-password" />
            <p id="cp-password-feedback" class="form-feedback" role="alert"></p>
          </div>
          <div class="form-group">
            <label for="cp-password-confirm">Confirmação de senha</label>
            <input type="password" id="cp-password-confirm" name="passwordConfirm" autocomplete="new-password" />
            <p id="cp-password-confirm-feedback" class="form-feedback" role="alert"></p>
          </div>
          <div class="form-group">
            <label>Instruções de senha</label>
            <output class="password-hint" id="cp-password-hint" for="cp-password"></output>
          </div>
          <div class="form-group form-actions">
            <button type="submit" class="btn btn-primary" id="cp-submit">Troca Senha</button>
            <button type="button" class="btn btn-secondary" id="cp-clear">Limpar</button>
          </div>
        </form>
      </div>
    </main>

    <footer class="site-footer site-footer--compact">
      <div class="site-footer__inner">
        <p class="text-muted">&copy; Placeholder Tech — conteúdo fictício.</p>
      </div>
    </footer>

    <script src="assets/js/auth-session.js"></script>
    <script src="assets/js/password-validation.js"></script>
    <script src="assets/js/layout.js"></script>
    <script src="assets/js/change-password.js"></script>
  </body>
</html>
